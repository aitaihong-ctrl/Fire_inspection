  <style>
    body { 
      overscroll-behavior-y: none; 
      -webkit-tap-highlight-color: transparent; 
    }
    @media print {
      @page { size: landscape; margin: 10mm; }
      body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .print\:hidden { display: none !important; }
      .print\:max-w-none { max-width: none !important; }
      .print\:w-full { width: 100% !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:m-0 { margin: 0 !important; }
      .print\:bg-white { background-color: white !important; }
      .print\:border-none { border: none !important; }
      .print\:shadow-none { box-shadow: none !important; }
    }
    
    @keyframes shimmer { 
      0% { background-position: -200% 0; } 
      100% { background-position: 200% 0; } 
    }
    .ai-shimmer { 
      background: linear-gradient(90deg, #8b5cf6 25%, #d946ef 50%, #8b5cf6 75%); 
      background-size: 200% 100%; 
      animation: shimmer 2s infinite linear; 
      color: transparent; 
      -webkit-background-clip: text; 
      background-clip: text; 
    }
    .ai-bg-shimmer { 
      background: linear-gradient(90deg, #f3e8ff 25%, #fae8ff 50%, #f3e8ff 75%); 
      background-size: 200% 100%; 
      animation: shimmer 3s infinite linear; 
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-20 print:pb-0 print:bg-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // 系統設定區
    // ==========================================
    const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwqc1u56dt1tuQiM5FQ_rBkq8zcBXNR0ahd8RYGLarg8O89N98by77eU9k8Hbd6Rjl_/exec"; // 🚨 請填入 GAS 網址
    const SYSTEM_SECRET_KEY = "TCI_FireSafety_2026_!@#";
    const apiKey = ""; // 🚨 Gemini API 整合 (選用)

    // ==========================================
    // API 呼叫工具
    // ==========================================
    const callGeminiAPI = async (prompt) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = { 
        contents: [{ parts: [{ text: prompt }] }], 
        systemInstruction: { parts: [{ text: "你是一位專業的廠區工安與消防設備顧問。請用繁體中文回答，語氣專業、簡明扼要。不要使用過度浮誇的詞彙，專注於事實與可執行的建議。" }] } 
      };
      try {
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "無法產生內容";
      } catch (e) { 
        return "AI 服務暫時無法使用。"; 
      }
    };

    const getClientIp = async () => {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
      } catch (e) { 
        return "未知IP"; 
      }
    };

    // ==========================================
    // 基礎設定與參數
    // ==========================================
    const EXTINGUISHER_QUESTIONS = [
      { id: 'q1', text: '壓力錶頭保持在綠色區及重量量測公斤數 (小數點一位)' },
      { id: 'q2', text: '鋼瓶瓶身是否銹蝕' },
      { id: 'q3', text: '配件是否鬆動脫落' },
      { id: 'q4', text: '有效期限是否超過' },
      { id: 'q5', text: '放置數量編號是否正確' }
    ];

    const HYDRANT_QUESTIONS = [
      { id: 'q1', text: '水帶*2、水瞄*1是否定位、有無破損及變形' },
      { id: 'q2', text: '是否有障礙物影響使用?' },
      { id: 'q3', text: '外觀是否明確標示?' },
      { id: 'q4', text: '紅色警示燈是否保持明亮?' },
      { id: 'q5', text: '閥門是否有漏水現象?' }
    ];

    // ==========================================
    // 圖示組件
    // ==========================================
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {

        QrCode: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
        ClipboardList: <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="15" y2="18"/></>,

        AlertTriangle: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,

        PenTool: <><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></>,

        Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
        Lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
        Key: <><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></>,
        Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        Trash2: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
        Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
        Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        User: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
        Users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        Eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
        EyeOff: <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>,
        Sparkles: <><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></>,
        FirefighterHose: <>
          <path d="M5 10a6 6 0 0 1 12 0" />
          <rect x="2" y="10" width="18" height="3" rx="1.5" />
          <circle cx="11" cy="7" r="1.5" />
          <path d="M5 13v1a6 6 0 0 0 12 0v-1" />
          <circle cx="8.5" cy="15" r="1.2" fill="currentColor" stroke="none" />
          <circle cx="13.5" cy="15" r="1.2" fill="currentColor" stroke="none" />
          <path d="M10 17.5c.5.8 1.5.8 2 0" strokeLinecap="round" />
          <path d="M18 16h2" strokeWidth="3" strokeLinecap="round" />
          <circle cx="22" cy="15" r="1" fill="currentColor" stroke="none" />
          <circle cx="20" cy="13" r="1.5" fill="currentColor" stroke="none" />
        </>
      };
      return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
    };

    function isPasswordComplexEnough(pwd) { 
      return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(pwd); 
    }
    function isPasswordExpired(date) { 
      if(!date) return true; 
      const diff = Math.abs(new Date() - new Date(date)) / (1000 * 60 * 60 * 24); 
      return diff > 90; 
    }

    // ==========================================
    // 主程式組件 (App)
    // ==========================================
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [dbUsers, setDbUsers] = useState([]);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [scannedEq, setScannedEq] = useState(null);
      const [selectedEqId, setSelectedEqId] = useState(null); 
      const [inspections, setInspections] = useState([]);
      const [dbEquipment, setDbEquipment] = useState([]); 
      const [isLoading, setIsLoading] = useState(false);
      const [alertMsg, setAlertMsg] = useState('');
      
      const [showPasswordChange, setShowPasswordChange] = useState(false);
      const [isForcePasswordChange, setIsForcePasswordChange] = useState(false);

      const currentDate = new Date();
      const currentYear = currentDate.getFullYear();
      const currentMonth = currentDate.getMonth() + 1;

      const totalItems = dbEquipment.length;
      const currentMonthInspections = inspections.filter(i => Number(i.year) === Number(currentYear) && Number(i.month) === Number(currentMonth));
      const completedItems = currentMonthInspections.length;
      const abnormalRecords = currentMonthInspections.filter(i => i.hasAbnormal);
      const abnormalItems = abnormalRecords.length;

      const fetchData = async () => {
        if (!GOOGLE_SHEET_API_URL) return; 
        setIsLoading(true);
        const safeSecret = encodeURIComponent(SYSTEM_SECRET_KEY);
        try {
          const resEq = await fetch(`${GOOGLE_SHEET_API_URL}?action=getEquipment&secret=${safeSecret}`);
          const dataEq = await resEq.json();
          if (dataEq && !dataEq.error) setDbEquipment(dataEq);

          const resIns = await fetch(`${GOOGLE_SHEET_API_URL}?action=getInspections&secret=${safeSecret}`);
          const dataIns = await resIns.json();
          if (dataIns && !dataIns.error) {
            setInspections(dataIns.map(i => ({ 
              ...i, 
              answers: typeof i.answers === 'string' ? JSON.parse(i.answers) : i.answers, 
              hasAbnormal: String(i.hasAbnormal).toLowerCase() === 'true' 
            })));
          }

          const resUsers = await fetch(`${GOOGLE_SHEET_API_URL}?action=getUsers&secret=${safeSecret}`);
          const dataUsers = await resUsers.json();
          if (dataUsers && !dataUsers.error) setDbUsers(dataUsers);
        } catch(e) { 
          console.error(e); 
        }
        setIsLoading(false);
      };

      useEffect(() => { 
        fetchData(); 
      }, []);

      const handleLoginSuccess = (user) => {
        setCurrentUser(user);
        if (isPasswordExpired(user.lastPasswordChange)) {
          setIsForcePasswordChange(true);
          setShowPasswordChange(true);
        }
      };

      const handlePasswordChangeSuccess = (updatedUser) => {
        setCurrentUser(updatedUser);
        setDbUsers(dbUsers.map(u => u.account === updatedUser.account ? updatedUser : u));
        setShowPasswordChange(false);
        setIsForcePasswordChange(false);
        setAlertMsg('密碼變更成功！');
      };

      const navigateTo = (tab, eqId = null) => {
        if (eqId) setSelectedEqId(eqId);
        setActiveTab(tab);
        window.scrollTo(0, 0);
      };

      const handleScan = (equipmentId) => {
        const eq = dbEquipment.find(e => (e.id || '').toString().trim() === (equipmentId || '').toString().trim());
        if (eq) { 
          setScannedEq(eq); 
          navigateTo('form'); 
        } else { 
          setAlertMsg(`找不到設備編號 [${equipmentId}]！請確認標籤是否為系統列管之設備。`); 
        }
      };

      // 提交表單：巡檢員送出第一階段
      const submitInspection = async (record, selectedTypeIfMissing, updatedQuantity) => {
        const now = new Date();
        const safeRecordId = (record.equipmentId || '').toString().trim();
        const currentIp = await getClientIp();
        
        const newRecord = { 
          ...record, 
          equipmentId: safeRecordId, 
          date: now.toLocaleString(), 
          month: now.getMonth() + 1, 
          year: now.getFullYear(), 
          inspectorIp: currentIp, 
          managerName: '', 
          managerDate: '', 
          managerIp: '' 
        };
        
        const existingIndex = inspections.findIndex(i => i.equipmentId === safeRecordId && Number(i.year) === now.getFullYear() && Number(i.month) === (now.getMonth() + 1));
        let newInspections = [...inspections];
        if (existingIndex >= 0) newInspections[existingIndex] = newRecord;
        else newInspections.push(newRecord);
        
        setInspections(newInspections);

        const currentEq = dbEquipment.find(e => e.id === safeRecordId) || {};
        const hasQuantityChanged = currentEq.quantity != updatedQuantity;

        if (selectedTypeIfMissing || hasQuantityChanged) {
          setDbEquipment(prev => prev.map(e => e.id === safeRecordId ? { ...e, extinguisherType: selectedTypeIfMissing || e.extinguisherType, quantity: updatedQuantity } : e));
        }

        setScannedEq(null);
        setActiveTab('success');
        setTimeout(() => setActiveTab('dashboard'), 2500);

        if (GOOGLE_SHEET_API_URL) {
          try {
            await fetch(GOOGLE_SHEET_API_URL, { 
              method: 'POST', 
              body: JSON.stringify({ action: 'addInspection', secret: SYSTEM_SECRET_KEY, data: { ...newRecord, answers: JSON.stringify(newRecord.answers) } }) 
            });
            if (selectedTypeIfMissing || hasQuantityChanged) {
              await fetch(GOOGLE_SHEET_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'updateEquipmentData', secret: SYSTEM_SECRET_KEY, id: safeRecordId, newType: selectedTypeIfMissing, newQuantity: updatedQuantity }) 
              });
            }
          } catch (err) { 
            console.error(err); 
          }
        }
      };

      // 火源責任者確認：第二階段簽核
      const handleConfirmRecord = async (eqId) => {
        const ip = await getClientIp();
        const confDate = new Date().toLocaleString();
        
        setInspections(prev => prev.map(i => {
          if (i.equipmentId === eqId && Number(i.year) === currentYear && Number(i.month) === currentMonth) {
            return { ...i, managerName: currentUser.name, managerIp: ip, managerDate: confDate };
          }
          return i;
        }));
        
        if (GOOGLE_SHEET_API_URL) {
          const payload = { action: 'confirmInspection', secret: SYSTEM_SECRET_KEY, equipmentId: eqId, year: currentYear, month: currentMonth, managerName: currentUser.name, managerIp: ip };
          try {
            setIsLoading(true);
            const res = await fetch(GOOGLE_SHEET_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.status === 'success') { 
              setAlertMsg("簽核確認成功！"); 
              fetchData(); 
            } else { 
              setAlertMsg("簽核儲存失敗，請重試。"); 
            }
          } catch (e) { 
            setAlertMsg("系統連線失敗。"); 
          } finally { 
            setIsLoading(false); 
          }
        }
      };

      // 火源責任者退回：刪除紀錄要求重檢
      const handleRejectRecord = async (eqId) => {
        if (!window.confirm("確定要「不同意」此點檢紀錄嗎？\n退回後該設備將恢復為「未點檢」狀態，巡檢員必須重新掃碼填報。")) return;
        
        setInspections(prev => prev.filter(i => !(i.equipmentId === eqId && Number(i.year) === currentYear && Number(i.month) === currentMonth)));
        
        if (GOOGLE_SHEET_API_URL) {
          const payload = { action: 'rejectInspection', secret: SYSTEM_SECRET_KEY, equipmentId: eqId, year: currentYear, month: currentMonth };
          try {
            setIsLoading(true);
            const res = await fetch(GOOGLE_SHEET_API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.status === 'success') { 
              setAlertMsg("已退回，紀錄已刪除並要求重新點檢！"); 
              fetchData(); 
            } else { 
              setAlertMsg("退回失敗，請重試。"); 
            }
          } catch (e) { 
            setAlertMsg("系統連線失敗。"); 
          } finally { 
            setIsLoading(false); 
          }
        } else {
          setAlertMsg("已退回，要求重新點檢！(本機模式)");
        }
      };

      const handleLogout = () => { 
        if(window.confirm("確定要登出嗎？")) { 
          setCurrentUser(null); 
          setActiveTab('dashboard'); 
        } 
      };

      if (!currentUser) return <LoginScreen onLogin={handleLoginSuccess} apiUrl={GOOGLE_SHEET_API_URL} />;
      
      if (showPasswordChange) {
        return <ChangePasswordScreen user={currentUser} isForced={isForcePasswordChange} apiUrl={GOOGLE_SHEET_API_URL} onSuccess={handlePasswordChangeSuccess} onCancel={() => setShowPasswordChange(false)} />;
      }

      return (
        <div className="min-h-screen bg-gray-50 pb-20 font-sans text-gray-800 print:bg-white">
          {/* 彈出提示視窗 */}
          {alertMsg && (
            <div className="fixed inset-0 z-[200] bg-black/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
                <Icon name="AlertTriangle" size={56} className="mx-auto text-yellow-500 mb-4" />
                <p className="text-lg font-bold mb-6 whitespace-pre-line text-gray-800">{alertMsg}</p>
                <button onClick={() => setAlertMsg('')} className="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-md transition-colors">
                  確定
                </button>
              </div>
            </div>
          )}

          {/* 頂部標題列 */}
          <header className="bg-red-700 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center print:hidden">
            <div className="flex items-center gap-2">
              <Icon name="FirefighterHose" size={28} className="text-yellow-300" />
              <h1 className="text-xl font-bold tracking-wider">廠區消防設備點檢</h1>
            </div>
            <div className="flex items-center gap-3">
              <div className="text-xs bg-red-800 px-3 py-1.5 rounded-full border border-red-600 flex items-center gap-1">
                <Icon name="User" size={14} /> 
                <span className="font-bold">{currentUser.name}</span>
              </div>
              <button onClick={() => setShowPasswordChange(true)} className="text-red-200 hover:text-white transition-colors" title="變更密碼">
                <Icon name="Key" size={22}/>
              </button>
              <button onClick={handleLogout} className="text-red-200 hover:text-white transition-colors" title="登出系統">
                <Icon name="LogOut" size={22}/>
              </button>
            </div>
          </header>

          {/* 主視圖區塊 */}
          <main className={`p-4 mx-auto print:max-w-none print:w-full print:p-0 print:m-0 ${activeTab === 'detail' || activeTab === 'batch-print' ? 'max-w-4xl' : 'max-w-lg'}`}>
            {activeTab === 'dashboard' && (
              <Dashboard 
                total={totalItems} completed={completedItems} abnormal={abnormalItems} abnormalRecords={abnormalRecords} 
                equipmentList={dbEquipment} currentYear={currentYear} currentMonth={currentMonth} 
                onScan={() => navigateTo('scanner')} onViewList={() => navigateTo('list')} onBatchPrint={() => navigateTo('batch-print')} 
              />
            )}
            {activeTab === 'scanner' && <Scanner onScan={handleScan} mockEquipment={dbEquipment} />}
            {activeTab === 'form' && scannedEq && <InspectionForm equipment={scannedEq} currentUser={currentUser} onSubmit={submitInspection} onCancel={() => navigateTo('dashboard')} />}
            {activeTab === 'list' && (
              <EquipmentList 
                equipmentList={dbEquipment} inspections={inspections} 
                currentYear={currentYear} currentMonth={currentMonth} 
                onDetail={(id) => navigateTo('detail', id)} 
                onConfirm={handleConfirmRecord} onReject={handleRejectRecord} 
              />
            )}
            {activeTab === 'detail' && selectedEqId && <InspectionReport equipment={dbEquipment.find(e => e.id === selectedEqId)} inspections={inspections} onBack={() => navigateTo('list')} />}
            {activeTab === 'records' && <RecordList equipmentList={dbEquipment} inspections={inspections} />}
            {activeTab === 'batch-print' && <BatchPrintView equipmentList={dbEquipment} inspections={inspections} onBack={() => navigateTo('dashboard')} />}
            {activeTab === 'admin' && <EquipmentManager equipmentList={dbEquipment} setDbEquipment={setDbEquipment} users={dbUsers} setDbUsers={setDbUsers} apiUrl={GOOGLE_SHEET_API_URL} setAlertMsg={setAlertMsg} />}
            
            {activeTab === 'success' && (
              <div className="flex flex-col items-center justify-center py-20">
                <Icon name="CheckCircle2" size={96} className="text-green-500 mb-6" />
                <h2 className="text-3xl font-bold text-gray-800">點檢送出成功！</h2>
              </div>
            )}
          </main>

          {/* 底部導覽列 */}
          <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 pb-5 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-20 print:hidden">
            <button onClick={() => navigateTo('dashboard')} className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'dashboard' ? 'text-red-700' : 'text-gray-400'}`}>
              <Icon name="Home" size={26} />
              <span className="text-[11px] mt-1 font-bold">首頁</span>
            </button>
            <button onClick={() => navigateTo('list')} className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'list' || activeTab === 'detail' ? 'text-red-700' : 'text-gray-400'}`}>
              <Icon name="ClipboardList" size={26} />
              <span className="text-[11px] mt-1 font-bold">清單</span>
            </button>
            <button onClick={() => navigateTo('scanner')} className="flex flex-col items-center p-2 w-1/5 -mt-8">
              <div className="bg-red-600 text-white p-4 rounded-full border-4 border-white shadow-lg transform transition hover:scale-105">
                <Icon name="QrCode" size={30} />
              </div>
              <span className={`text-[11px] mt-2 font-bold ${activeTab === 'scanner' ? 'text-red-700' : 'text-gray-600'}`}>掃碼</span>
            </button>
            <button onClick={() => navigateTo('records')} className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'records' ? 'text-red-700' : 'text-gray-400'}`}>
              <Icon name="History" size={26} />
              <span className="text-[11px] mt-1 font-bold">明細</span>
            </button>
            {currentUser.role === 'admin' ? (
              <button onClick={() => navigateTo('admin')} className={`flex flex-col items-center p-2 w-1/5 ${activeTab === 'admin' ? 'text-red-700' : 'text-gray-400'}`}>
                <Icon name="Settings" size={26} />
                <span className="text-[11px] mt-1 font-bold">管理</span>
              </button>
            ) : (
              <div className="w-1/5"></div>
            )}
          </nav>
        </div>
      );
    }

    // ==========================================
    // 登入與安全設定
    // ==========================================
    function ChangePasswordScreen({ user, isForced, apiUrl, onSuccess, onCancel }) {
      const [oldPwd, setOldPwd] = useState('');
      const [newPwd, setNewPwd] = useState('');
      const [confirmPwd, setConfirmPwd] = useState('');
      const [error, setError] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [showOldPwd, setShowOldPwd] = useState(false);
      const [showNewPwd, setShowNewPwd] = useState(false);
      const [showConfirmPwd, setShowConfirmPwd] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        if (newPwd !== confirmPwd) { setError('兩次輸入的新密碼不一致'); return; }
        if (!isPasswordComplexEnough(newPwd)) { setError('長度至少 8 碼，須含大小寫英文及數字。'); return; }
        if (oldPwd === newPwd) { setError('新舊密碼不可相同'); return; }
        
        setIsSubmitting(true);
        if (apiUrl) {
          try {
            const response = await fetch(apiUrl, { 
              method: 'POST', 
              body: JSON.stringify({ action: 'changePassword', secret: SYSTEM_SECRET_KEY, account: user.account, oldPassword: oldPwd, newPassword: newPwd }) 
            });
            const data = await response.json();
            if (data.status === 'success') { 
              onSuccess({ ...user, password: newPwd, lastPasswordChange: new Date().toISOString() }); 
            } else { 
              setError(data.message || '變更失敗'); 
            }
          } catch (err) { 
            setError('連線失敗，請檢查網路。'); 
          }
        } else {
          onSuccess({ ...user, password: newPwd, lastPasswordChange: new Date().toISOString() }); 
        }
        setIsSubmitting(false);
      };

      return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8 border-t-8 border-yellow-500 animate-in zoom-in-95">
            <div className="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
              <Icon name="Key" size={40} className="text-yellow-600" />
            </div>
            <h2 className="text-2xl font-black text-center mb-6 text-gray-800">安全設定</h2>
            
            {isForced ? (
              <div className="bg-red-50 p-3 rounded-xl mb-6 border border-red-100">
                <p className="text-sm text-red-600 font-bold text-center">您的密碼已超過 90 天未變更或為首次登入，基於資安考量請立即更新密碼。</p>
              </div>
            ) : (
              <p className="text-sm text-gray-500 text-center mb-6">定期更新密碼以保護系統安全</p>
            )}
            
            {error && <div className="bg-red-50 text-red-600 text-sm font-bold p-3 rounded-lg mb-4 text-center border border-red-200">{error}</div>}
            
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="text-xs font-bold text-gray-500 ml-1">請輸入舊密碼</label>
                <div className="relative mt-1">
                  <input type={showOldPwd ? "text" : "password"} required value={oldPwd} onChange={e=>setOldPwd(e.target.value)} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-yellow-500 font-bold tracking-widest" placeholder="••••••••" />
                  <button type="button" onClick={()=>setShowOldPwd(!showOldPwd)} className="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600"><Icon name={showOldPwd?"EyeOff":"Eye"} size={20}/></button>
                </div>
              </div>
              <div className="pt-2 border-t">
                <label className="text-xs font-bold text-gray-500 ml-1">設定新密碼</label>
                <div className="relative mt-1">
                  <input type={showNewPwd ? "text" : "password"} required value={newPwd} onChange={e=>setNewPwd(e.target.value)} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-yellow-500 font-bold" placeholder="大小寫英文+數字，至少8碼" />
                  <button type="button" onClick={()=>setShowNewPwd(!showNewPwd)} className="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600"><Icon name={showNewPwd?"EyeOff":"Eye"} size={20}/></button>
                </div>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 ml-1">再次確認新密碼</label>
                <div className="relative mt-1">
                  <input type={showConfirmPwd ? "text" : "password"} required value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)} className="w-full border-2 border-gray-200 p-3 rounded-xl outline-none focus:border-yellow-500 font-bold tracking-widest" placeholder="••••••••" />
                  <button type="button" onClick={()=>setShowConfirmPwd(!showConfirmPwd)} className="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600"><Icon name={showConfirmPwd?"EyeOff":"Eye"} size={20}/></button>
                </div>
              </div>
              <div className="flex gap-3 pt-4">
                {!isForced && (
                  <button type="button" onClick={onCancel} className="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold transition-colors">
                    取消
                  </button>
                )}
                <button type="submit" disabled={isSubmitting} className="flex-1 py-3.5 bg-yellow-500 hover:bg-yellow-600 text-white rounded-xl font-bold shadow-md transition-colors">
                  {isSubmitting ? '驗證中...' : '確認變更'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function LoginScreen({ onLogin, apiUrl }) {
      const [account, setAccount] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState('');
      const [isLoggingIn, setIsLoggingIn] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setError('');
        if (!apiUrl) { setError('系統尚未連線至資料庫，請先設定 API 網址！'); return; }
        setIsLoggingIn(true);
        try {
          const res = await fetch(apiUrl, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'login', secret: SYSTEM_SECRET_KEY, account: account.trim(), password: password }) 
          });
          const data = await res.json();
          if (data.status === 'success') {
            onLogin(data.user); 
          } else {
            setError(data.message || '帳號或密碼錯誤');
          }
        } catch (err) { 
          setError('連線失敗，請檢查網路狀態'); 
        } finally { 
          setIsLoggingIn(false); 
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 animate-in zoom-in-95">
            <div className="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
              <Icon name="Lock" size={48} className="text-red-600" />
            </div>
            <h2 className="text-3xl font-black text-center text-gray-800 mb-2">廠區消防設備點檢系統登入</h2>
            <p className="text-sm text-gray-500 text-center mb-8">請輸入您的專屬帳號與密碼</p>
            
            {error && <div className="bg-red-50 text-red-600 text-sm font-bold p-3 rounded-xl mb-6 text-center border border-red-200">{error}</div>}
            
            <form onSubmit={handleLogin} className="space-y-6">
              <div>
                <label className="text-sm font-bold text-gray-600 ml-1">登入帳號</label>
                <input type="text" required placeholder="Account" value={account} onChange={e=>setAccount(e.target.value)} className="w-full border-2 border-gray-200 p-4 rounded-xl mt-1 outline-none focus:border-red-500 font-bold transition-colors" />
              </div>
              <div>
                <label className="text-sm font-bold text-gray-600 ml-1">登入密碼</label>
                <div className="relative mt-1">
                  <input type={showPassword ? "text" : "password"} required placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full border-2 border-gray-200 p-4 rounded-xl outline-none focus:border-red-500 font-bold tracking-widest transition-colors" />
                  <button type="button" onClick={()=>setShowPassword(!showPassword)} className="absolute right-4 top-4 text-gray-400 hover:text-gray-600"><Icon name={showPassword?"EyeOff":"Eye"} size={22}/></button>
                </div>
              </div>
              <button type="submit" disabled={isLoggingIn} className={`w-full py-4 text-white rounded-xl font-bold shadow-lg transition-colors text-lg mt-2 ${isLoggingIn ? 'bg-red-400' : 'bg-red-600 hover:bg-red-700'}`}>
                {isLoggingIn ? '驗證中...' : '安全登入'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==========================================
    // 首頁與 AI 總結 (Dashboard)
    // ==========================================
    function Dashboard({ total, completed, abnormal, abnormalRecords, equipmentList, currentYear, currentMonth, onScan, onViewList, onBatchPrint }) {
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
      const [aiSummary, setAiSummary] = useState('');
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);

      const handleGenerateAISummary = async () => {
        setIsGeneratingAI(true);
        try {
          let prompt = `請以專業且簡潔的繁體中文，為 ${currentYear} 年 ${currentMonth} 月的「廠區消防設備點檢」撰寫一份 150 字以內的高階主管總結報告。\n本月數據：列管總設備數 ${total} 支，已完成巡檢 ${completed} 支，發現異常設備 ${abnormal} 支。\n`;
          if (abnormal > 0) {
            prompt += `異常設備明細如下：\n`;
            abnormalRecords.forEach(rec => {
              const eq = equipmentList.find(e => e.id === rec.equipmentId);
              prompt += `- 設備 [${rec.equipmentId}] (${eq?.type || '未知'}): ${rec.remark || '未填寫備註'}\n`;
            });
            prompt += `請總結這些安全隱患，並給出後續修繕與防範的具體建議。`;
          } else {
            prompt += `本月全廠區設備皆正常。請給予巡檢團隊鼓勵，並簡單提醒未來的日常維護注意事項。`;
          }
          const summaryText = await callGeminiAPI(prompt);
          setAiSummary(summaryText);
        } catch (error) { 
          alert(error.message); 
        } finally { 
          setIsGeneratingAI(false); 
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          {total === 0 && (
            <div className="bg-yellow-50 p-5 rounded-2xl border border-yellow-200 shadow-sm">
              <h3 className="text-yellow-800 font-bold flex items-center gap-2 mb-2 text-lg"><Icon name="AlertTriangle" size={24}/> 系統目前無任何設備資料</h3>
              <p className="text-sm text-yellow-700 leading-relaxed font-medium">請聯絡管理員至後台「批次匯入 CSV」真實設備清單，即可開始使用系統！</p>
            </div>
          )}

          {/* AI 總結區塊 */}
          <div className="bg-white rounded-3xl shadow-sm border border-purple-100 p-6 relative overflow-hidden">
             <div className="flex items-center justify-between mb-4">
               <h2 className="text-purple-800 font-bold flex items-center gap-2 text-lg">
                 <Icon name="Sparkles" size={24} className="text-purple-500" /> 
                 AI 安檢總結報告
               </h2>
             </div>
             
             {aiSummary ? (
               <div className="bg-purple-50 p-5 rounded-2xl border border-purple-100 text-sm text-purple-900 leading-relaxed whitespace-pre-line relative shadow-inner">
                 <div className="absolute top-2 right-2 opacity-10"><Icon name="Sparkles" size={48}/></div>
                 {aiSummary}
               </div>
             ) : (
               <p className="text-sm text-gray-500 mb-5 leading-relaxed">
                 透過 Gemini 語言模型，一鍵自動分析本月點檢數據與異常紀錄，快速產生高階主管專用的決策摘要。
               </p>
             )}
             
             <button 
               onClick={handleGenerateAISummary} 
               disabled={isGeneratingAI} 
               className={`w-full py-3.5 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-colors mt-3 shadow-sm ${isGeneratingAI ? 'ai-bg-shimmer text-purple-700 cursor-wait' : 'bg-purple-100 text-purple-700 hover:bg-purple-200'}`}
             >
               {isGeneratingAI ? '✨ 分析資料並生成報告中...' : '✨ 產生安檢總結報告'}
             </button>
          </div>

          <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <h2 className="text-gray-500 text-sm font-bold mb-6 flex items-center gap-2">
              <Icon name="Calendar" size={20} /> 當月進度 ({currentYear}年 {currentMonth}月)
            </h2>
            <div className="flex items-center justify-between">
              <div className="relative w-28 h-28 flex items-center justify-center">
                <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                  <path strokeDasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#f3f4f6" strokeWidth="3" />
                  <path strokeDasharray={`${percent}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#dc2626" strokeWidth="3" strokeLinecap="round" className="transition-all duration-1000 ease-out" />
                </svg>
                <div className="absolute flex flex-col items-center">
                  <span className="text-3xl font-black text-gray-800">{percent}%</span>
                </div>
              </div>
              <div className="flex-1 ml-8 space-y-4">
                <div className="flex justify-between items-center border-b pb-2">
                  <span className="text-sm font-bold text-gray-500">列管總數</span>
                  <span className="font-black text-lg text-gray-800">{total} 支</span>
                </div>
                <div className="flex justify-between items-center border-b pb-2">
                  <span className="text-sm font-bold text-gray-500">已完成</span>
                  <span className="font-black text-lg text-green-600">{completed} 支</span>
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-sm font-bold text-gray-500">異常數</span>
                  <span className="font-black text-lg text-red-600">{abnormal} 支</span>
                </div>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <button onClick={onScan} className="bg-red-50 hover:bg-red-100 text-red-700 p-6 rounded-3xl flex flex-col items-center justify-center border border-red-100 shadow-sm transition-colors">
              <Icon name="QrCode" size={40} className="mb-3" />
              <span className="font-bold text-lg">現場掃碼</span>
            </button>
            <button onClick={onViewList} className="bg-blue-50 hover:bg-blue-100 text-blue-700 p-6 rounded-3xl flex flex-col items-center justify-center border border-blue-100 shadow-sm transition-colors">
              <Icon name="ClipboardList" size={40} className="mb-3" />
              <span className="font-bold text-lg">設備清單</span>
            </button>
          </div>

          <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
             <div className="flex items-center justify-between mb-4">
               <h2 className="text-gray-800 font-bold text-lg flex items-center gap-2">
                 <Icon name="AlertTriangle" size={22} className="text-red-500" /> 當月待處理異常
               </h2>
             </div>
             {abnormal > 0 ? (
               <div className="p-4 bg-red-50 border border-red-100 rounded-2xl flex items-start gap-4">
                 <Icon name="AlertTriangle" className="text-red-500 shrink-0" size={24} />
                 <div>
                   <p className="text-base font-bold text-red-800">發現 {abnormal} 件設備異常</p>
                   <p className="text-sm text-red-600 mt-1 font-medium">請盡速通知相關設備單位處理修繕。</p>
                 </div>
